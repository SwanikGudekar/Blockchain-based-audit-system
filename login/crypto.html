<!DOCTYPE html>
<html>
<head>
  <title>ETH Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0d1422;
      --card: #111827;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --glow: rgba(59,130,246,0.35);
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --danger: #f43f5e;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 50%, rgba(59,130,246,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 80% 30%, rgba(6,182,212,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header badge */
    .network-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--success);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    .network-badge .dot {
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Title */
    .title {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-family: var(--mono);
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.05), 0 25px 60px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    /* Fields */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field label .icon {
      width: 16px; height: 16px;
      opacity: 0.7;
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    /* Amount row */
    .amount-row {
      position: relative;
    }

    .amount-row input {
      padding-right: 56px;
    }

    .amount-unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* Send button */
    .send-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.4);
    }

    .send-btn:hover::before { opacity: 1; }
    .send-btn:active { transform: translateY(0); }

    .send-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .send-btn svg { flex-shrink: 0; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Result panel */
    .result-panel {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .result-panel.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .result-panel.success .result-header {
      background: rgba(16,185,129,0.1);
      color: var(--success);
      border-bottom: 1px solid rgba(16,185,129,0.2);
    }

    .result-panel.error .result-header {
      background: rgba(244,63,94,0.1);
      color: var(--danger);
      border-bottom: 1px solid rgba(244,63,94,0.2);
    }

    .result-panel pre {
      background: var(--surface);
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="network-badge">
    <span class="dot"></span>
    GANACHE LOCAL NETWORK
  </div>

  <h1 class="title">Send ETH</h1>
  <p class="subtitle">// transfer funds on local chain</p>

  <div class="card">

    <div class="field">
      <label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Receiver Address
      </label>
      <input type="text" id="receiver" size="50" placeholder="0x... paste Ganache address">
    </div>

    <div class="field">
      <label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        Amount
      </label>
      <div class="amount-row">
        <input type="number" id="amount" step="0.01" placeholder="0.00">
        <span class="amount-unit">ETH</span>
      </div>
    </div>

    <hr class="divider">

    <button class="send-btn" onclick="sendETH()" id="sendBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Send Transaction
    </button>

    <div class="result-panel" id="resultPanel">
      <div class="result-header" id="resultHeader">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="resultIcon">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="resultLabel">Success</span>
      </div>
      <pre id="result"></pre>
    </div>

  </div>

  <p class="footer">secured · local · permissionless</p>

</div>

<script>
async function sendETH() {
  const receiver = document.getElementById("receiver").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if (!receiver || !amount) {
    alert("Please enter receiver address and amount");
    return;
  }

  // UI loading state
  const btn = document.getElementById("sendBtn");
  btn.classList.add("loading");
  btn.innerHTML = '<div class="spinner"></div> Broadcasting...';

  try {
    const res = await fetch("http://localhost:3000/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ receiver, amount })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      JSON.stringify(data, null, 2);

    // Show success panel
    const panel = document.getElementById("resultPanel");
    panel.className = "result-panel visible success";
    document.getElementById("resultLabel").textContent = "Transaction Broadcast";
    document.getElementById("resultIcon").innerHTML = '<polyline points="20 6 9 17 4 12"/>';

  } catch (err) {
    document.getElementById("result").innerText =
      "Error: " + err.message;

    // Show error panel
    const panel = document.getElementById("resultPanel");
    panel.className = "result-panel visible error";
    document.getElementById("resultLabel").textContent = "Transaction Failed";
    document.getElementById("resultIcon").innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
  }

  // Restore button
  btn.classList.remove("loading");
  btn.innerHTML = `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    Send Transaction`;
}
</script>

</body>
</html>
