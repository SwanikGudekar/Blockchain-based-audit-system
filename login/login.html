<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #020609;
      --surface:  #050e17;
      --card:     #071420;
      --border:   #0d2137;
      --accent:   #00e5ff;
      --accent2:  #0077ff;
      --glow:     rgba(0,229,255,0.18);
      --text:     #d0e8f5;
      --muted:    #2a5070;
      --mono:     'Share Tech Mono', monospace;
      --sans:     'Rajdhani', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated hex grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      animation: drift 25s linear infinite;
      pointer-events: none;
    }

    @keyframes drift { to { transform: translateY(36px); } }

    /* Radial glow blobs */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 15% 60%, rgba(0,119,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 85% 30%, rgba(0,229,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.05),
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(0,229,255,0.08);
      animation: rise 0.55s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(28px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 999px;
      opacity: 0.7;
    }

    /* Corner decorations */
    .card::after {
      content: '';
      position: absolute;
      top: -1px; right: -1px;
      width: 36px; height: 36px;
      border-top: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      border-radius: 0 20px 0 0;
      opacity: 0.5;
    }

    .corner-bl {
      position: absolute;
      bottom: -1px; left: -1px;
      width: 36px; height: 36px;
      border-bottom: 2px solid var(--accent2);
      border-left: 2px solid var(--accent2);
      border-radius: 0 0 0 20px;
      opacity: 0.4;
    }

    /* ── Logo area ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
      flex-shrink: 0;
    }

    .logo-text h2 {
      font-family: var(--sans);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      text-transform: uppercase;
    }

    .logo-text p {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-top: 2px;
    }

    /* ── Fields ── */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--muted);
      display: flex;
      pointer-events: none;
      transition: color 0.2s;
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }

    .field input:focus + .focus-line,
    .input-wrap:focus-within .input-icon { color: var(--accent); }

    /* ── Submit button ── */
    button[type="submit"] {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    button[type="submit"]::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,229,255,0.35);
    }

    button[type="submit"]:hover::before { opacity: 1; }
    button[type="submit"]:active { transform: translateY(0); }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 26px 0 20px;
    }

    /* Footer */
    .card-footer {
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="corner-bl"></div>

  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div class="logo-text">
      <h2>Secure Login</h2>
      <p>// authenticated access only</p>
    </div>
  </div>

  <form id="loginForm">

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
        </span>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
    </div>

    <div class="field">
      <label>Private Key</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6M15.5 7.5l3 3 3-3m-6 3 3-3"/>
          </svg>
        </span>
        <input type="text" name="private_key" placeholder="0x..." required>
      </div>
    </div>

    <hr class="divider">

    <button type="submit">Authenticate →</button>

  </form>

  <div class="card-footer" style="margin-top:18px;">secured · encrypted · decentralized</div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    let res = await fetch("/login", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if (data.status === "success") {

        // ✅ Store in localStorage
        localStorage.setItem("user", JSON.stringify(data.user));

        // redirect
        window.location.href = "/dashboard";

    } else {
        alert("Invalid Credentials");
    }
});
</script>

</body>
</html>
